# Install https://github.com/espanso/espanso/releases
#
# In main config, add search shortcut (instead of default hotkey) (/Users/senaev/Library/Application Support/espanso/config/default.yml):
# search_shortcut:
#   SHIFT+META+V
#
# In match config (/Users/senaev/Library/Application Support/espanso/match/base.yml) add:
# imports:
#  - "/Users/senaev/projects/senaev-keyboard-settings/espanso/external-matches.yaml"

matches:
  - trigger: ":dd"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%Y-%m-%d"

  - trigger: ":cc"
    replace: "✅"

  - trigger: ":zz"
    replace: "👉"

  - trigger: ":xx"
    replace: "❌"

  - trigger: ":ok"
    replace: "👌"

  - trigger: ":info"
    replace: "ℹ️"

  - trigger: ":warn"
    replace: "⚠️"

  - trigger: ":crit"
    replace: "🚨"

  - trigger: ":!!"
    replace: "❗️"

  - trigger: ":??"
    replace: "❓"

  - trigger: ":think"
    replace: "🤔"

  - trigger: ":pls"
    replace: "🙏"

  - trigger: ":shrug"
    replace: "🤷"

  - trigger: ":write"
    replace: "✍️"

  - trigger: ":red"
    replace: "🔴"

  - trigger: ":green"
    replace: "🟢"

  - trigger: ":blue"
    replace: "🔵"

  - trigger: "->"
    replace: "→"

  - trigger: "<-"
    replace: "←"

  - trigger: ":new"
    replace: "🆕"

  - trigger: ":up"
    replace: "⬆️"

  - trigger: ":right"
    replace: "➡️"

  - trigger: ":down"
    replace: "⬇️"

  - trigger: ":left"
    replace: "⬅️"

  - trigger: ":..."
    replace: "…"

  - trigger: ":refresh"
    replace: "🔄"

  - trigger: ":plus"
    replace: "➕"

  - trigger: ":minus"
    replace: "➖"

  - trigger: ":link"
    replace: "🔗"

  - trigger: ":finish"
    replace: "🏁"

  - trigger: ":thumbup"
    replace: "👍"

  - trigger: ":thumbdown"
    replace: "👎"

  - trigger: ":lipstick"
    replace: "💄"

  - trigger: ":coffin"
    replace: "⚰️"

  - trigger: ":cat"
    replace: "🐈"

  - trigger: ":dog"
    replace: "🐕"

  - trigger: ":handshake"
    replace: "🤝"

  - trigger: ":tada"
    replace: "🎉"

  - trigger: ":gear"
    replace: "⚙️"

  - trigger: ":fire"
    replace: "🔥"

  - trigger: ":bug"
    replace: "🐛"

  - trigger: ":lock"
    replace: "🔒"

  - trigger: ":key"
    replace: "🔑"

  - trigger: ":clock"
    replace: "🕐"

  - trigger: ":pin"
    replace: "📌"

  - trigger: ":memo"
    replace: "📝"

  - trigger: ":mag"
    replace: "🔍"

  - trigger: ":boom"
    replace: "💥"

  - trigger: ":wrench"
    replace: "🔧"

  - trigger: ":test"
    replace: "🧪"

  - trigger: ":block"
    replace: "🚫"

  - trigger: ":pause"
    replace: "⏸️"

  - trigger: ":yellow"
    replace: "🟡"

  - trigger: ":purple"
    replace: "🟣"

  - trigger: ":robot"
    replace: "🤖"

  - trigger: ":eyes"
    replace: "👀"

  - trigger: ":smile"
    replace: "😊"

  - trigger: ":laugh"
    replace: "😄"

  - trigger: ":s.test"
    replace: "https://test.senaev.com/test"

  - trigger: ":root_folder"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo $(cd ~ && pwd)"
