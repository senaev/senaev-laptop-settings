"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$directory\
[оВі](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
$character"""

[character]
success_symbol = "[оВі](bold #396050)"
error_symbol = "[оВі](bold #603939)"

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'
